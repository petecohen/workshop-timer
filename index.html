<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, full-screen countdown timer for workshops and presentations">
    <title>Workshop Timer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9201;</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --bg-r: 0; --bg-g: 0; --bg-b: 0;
            --text-r: 255; --text-g: 255; --text-b: 255;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
        }

        .screen.active {
            display: flex;
        }

        /* Timer Screen */
        .timer-screen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .timer-display {
            font-size: clamp(10rem, 30vw, 25rem);
            font-weight: 300;
            text-align: center;
            line-height: 0.8;
            margin: 2rem 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
        }

        .timer-controls {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.3rem;
            padding-bottom: env(safe-area-inset-bottom, 0);
            align-items: flex-end;
            justify-content: flex-start;
        }

        .btn {
            background: transparent;
            border: 1px solid rgba(var(--text-r), var(--text-g), var(--text-b), 0.3);
            color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.6);
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            min-width: 60px;
            font-family: inherit;
        }

        .btn:hover {
            background: rgba(var(--text-r), var(--text-g), var(--text-b), 0.1);
            color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.9);
            border-color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.primary {
            background: rgba(var(--text-r), var(--text-g), var(--text-b), 0.1);
            color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.8);
            border-color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.5);
        }

        .btn.selected {
            background: rgba(var(--text-r), var(--text-g), var(--text-b), 0.15);
            color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.5);
            border-color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.3);
        }

        .settings-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: 1px solid rgba(var(--text-r), var(--text-g), var(--text-b), 0.3);
            color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.6);
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .settings-btn:hover {
            background: rgba(var(--text-r), var(--text-g), var(--text-b), 0.1);
            color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.9);
            border-color: rgba(var(--text-r), var(--text-g), var(--text-b), 0.6);
        }

        /* Settings Screen */
        .settings-screen {
            flex-direction: column;
            padding: 2rem;
            align-items: center;
            overflow-y: auto;
            background: #1a1a1a;
            color: #e0e0e0;
        }

        .settings-content {
            max-width: 480px;
            width: 100%;
            padding: 1rem 0;
        }

        .settings-header {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-btn {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background 0.2s;
            line-height: 1;
            font-family: inherit;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .settings-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-left: 0.75rem;
        }

        .settings-section {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 1rem;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
        }

        .setting-row + .setting-row {
            border-top: 1px solid #3a3a3a;
            margin-top: 0.5rem;
            padding-top: 1rem;
        }

        .setting-label {
            font-size: 0.95rem;
        }

        .setting-sublabel {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.2rem;
        }

        /* Color pickers */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .color-preview {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid #555;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }

        .color-preview::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-preview::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }

        .color-preview::-moz-color-swatch {
            border: none;
            border-radius: 6px;
        }

        .color-hex {
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.85rem;
            color: #aaa;
            min-width: 65px;
        }

        /* Preset grid */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .preset-btn {
            background: #3a3a3a;
            border: 2px solid transparent;
            color: #e0e0e0;
            padding: 0.75rem 0.5rem;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .preset-btn:hover {
            background: #4a4a4a;
        }

        .preset-btn.selected {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* Custom time inputs */
        .custom-time-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #3a3a3a;
        }

        .time-input-group {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .time-input {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 0.5rem;
            font-size: 1.1rem;
            text-align: center;
            width: 55px;
            border-radius: 6px;
            font-family: inherit;
        }

        .time-input:focus {
            outline: none;
            border-color: #888;
        }

        .time-unit {
            font-size: 0.8rem;
            color: #888;
        }

        .apply-btn {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            margin-left: auto;
            font-family: inherit;
        }

        .apply-btn:hover {
            background: #4a4a4a;
            border-color: #888;
        }

        .apply-btn.applied {
            background: #2d5a2d;
            border-color: #4a8a4a;
            color: #8fdf8f;
        }

        /* Toggle switch */
        .toggle-track {
            position: relative;
            width: 44px;
            height: 24px;
            background: #555;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .toggle-track[aria-checked="true"] {
            background: #4cd964;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-track[aria-checked="true"]::after {
            transform: translateX(20px);
        }

        /* Keyboard shortcuts */
        .shortcut-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .shortcut-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .shortcut-row + .shortcut-row {
            border-top: 1px solid #3a3a3a;
            padding-top: 0.5rem;
        }

        .shortcut-key {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        kbd {
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 0.15rem 0.4rem;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.8rem;
            color: #ccc;
        }

        /* Reset button */
        .reset-defaults-btn {
            background: none;
            border: 1px solid #555;
            color: #888;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            width: 100%;
            font-family: inherit;
        }

        .reset-defaults-btn:hover {
            border-color: #888;
            color: #ccc;
        }

        .attribution {
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            margin-top: 1.5rem;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .attribution a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }

        .attribution a:hover {
            color: #ccc;
        }

        /* Flash animation */
        .finished {
            animation: flash 1s infinite;
        }

        @keyframes flash {
            0%, 50% {
                background: var(--bg-color);
                color: var(--text-color);
            }
            51%, 100% {
                background: var(--text-color);
                color: var(--bg-color);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .finished {
                animation: none;
                background: var(--text-color);
                color: var(--bg-color);
            }
        }

        @media (max-width: 768px) {
            .timer-controls {
                bottom: 3rem;
                left: 1rem;
                right: 1rem;
                padding-bottom: calc(env(safe-area-inset-bottom, 0) + 1rem);
                flex-wrap: wrap;
                gap: 0.2rem;
            }
            .settings-screen {
                padding: 1rem;
            }
            .preset-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.4rem;
            }
            .preset-btn {
                padding: 0.6rem 0.3rem;
                font-size: 0.85rem;
            }
            .settings-btn {
                top: 1rem;
                right: 1rem;
                padding-top: calc(env(safe-area-inset-top, 0) + 0.3rem);
            }
        }
    </style>
</head>
<body>
    <!-- Timer Screen -->
    <div class="screen timer-screen active" id="timerScreen" role="main" aria-label="Timer">
        <div class="timer-display" id="timerDisplay" role="timer" aria-live="polite" aria-atomic="true">05:00</div>

        <div class="timer-controls" role="toolbar" aria-label="Timer controls">
            <button class="btn primary" id="startBtn" aria-label="Start timer">Start</button>
            <button class="btn" id="resetBtn" aria-label="Reset timer">Reset</button>
            <button class="btn" data-preset="30" aria-label="Set 30 seconds">30s</button>
            <button class="btn" data-preset="60" aria-label="Set 1 minute">1m</button>
            <button class="btn" data-preset="120" aria-label="Set 2 minutes">2m</button>
            <button class="btn" data-preset="180" aria-label="Set 3 minutes">3m</button>
            <button class="btn" data-preset="240" aria-label="Set 4 minutes">4m</button>
            <button class="btn selected" data-preset="300" aria-label="Set 5 minutes">5m</button>
            <button class="btn" data-preset="600" aria-label="Set 10 minutes">10m</button>
            <button class="btn" data-preset="900" aria-label="Set 15 minutes">15m</button>
        </div>

        <button class="settings-btn" id="settingsOpenBtn" aria-label="Open settings">Settings</button>
    </div>

    <!-- Settings Screen -->
    <div class="screen settings-screen" id="settingsScreen" role="complementary" aria-label="Settings">
        <div class="settings-content">
            <div class="settings-header">
                <button class="back-btn" id="backBtn" aria-label="Back to timer">&larr;</button>
                <h1 class="settings-title">Settings</h1>
            </div>

            <!-- Colours section -->
            <div class="settings-section">
                <div class="section-label">Colours</div>
                <div class="setting-row">
                    <div>
                        <div class="setting-label">Background</div>
                    </div>
                    <div class="color-picker-wrapper">
                        <span class="color-hex" id="bgHex">#000000</span>
                        <input type="color" class="color-preview" id="bgColorPicker" value="#000000" aria-label="Background colour">
                    </div>
                </div>
                <div class="setting-row">
                    <div>
                        <div class="setting-label">Text</div>
                    </div>
                    <div class="color-picker-wrapper">
                        <span class="color-hex" id="textHex">#ffffff</span>
                        <input type="color" class="color-preview" id="textColorPicker" value="#ffffff" aria-label="Text colour">
                    </div>
                </div>
            </div>

            <!-- Duration section -->
            <div class="settings-section">
                <div class="section-label">Duration</div>
                <div class="preset-grid" role="group" aria-label="Preset durations">
                    <button class="preset-btn" data-preset="30">30s</button>
                    <button class="preset-btn" data-preset="60">1m</button>
                    <button class="preset-btn" data-preset="120">2m</button>
                    <button class="preset-btn" data-preset="180">3m</button>
                    <button class="preset-btn" data-preset="240">4m</button>
                    <button class="preset-btn selected" data-preset="300">5m</button>
                    <button class="preset-btn" data-preset="600">10m</button>
                    <button class="preset-btn" data-preset="900">15m</button>
                </div>
                <div class="custom-time-row">
                    <div class="time-input-group">
                        <input type="number" id="minutesInput" class="time-input" min="0" max="99" placeholder="0" aria-label="Minutes">
                        <span class="time-unit">m</span>
                    </div>
                    <div class="time-input-group">
                        <input type="number" id="secondsInput" class="time-input" min="0" max="59" placeholder="0" aria-label="Seconds">
                        <span class="time-unit">s</span>
                    </div>
                    <button class="apply-btn" id="applyCustomBtn">Apply</button>
                </div>
            </div>

            <!-- Flash alert section -->
            <div class="settings-section">
                <div class="section-label">Alerts</div>
                <div class="setting-row">
                    <div>
                        <div class="setting-label">Flash alert</div>
                        <div class="setting-sublabel">Screen flashes when timer ends</div>
                    </div>
                    <div class="toggle-track" id="flashToggle" role="switch" aria-checked="true" aria-label="Flash alert" tabindex="0"></div>
                </div>
            </div>

            <!-- Keyboard shortcuts section -->
            <div class="settings-section">
                <div class="section-label">Keyboard Shortcuts</div>
                <div class="shortcut-list">
                    <div class="shortcut-row">
                        <span class="setting-label">Start / Pause</span>
                        <span class="shortcut-key"><kbd>Space</kbd></span>
                    </div>
                    <div class="shortcut-row">
                        <span class="setting-label">Reset</span>
                        <span class="shortcut-key"><kbd>R</kbd></span>
                    </div>
                    <div class="shortcut-row">
                        <span class="setting-label">Settings</span>
                        <span class="shortcut-key"><kbd>S</kbd></span>
                    </div>
                </div>
            </div>

            <button class="reset-defaults-btn" id="resetDefaultsBtn">Reset to Defaults</button>

            <div class="attribution">
                <a href="https://workshop-timer-site.netlify.app">About Workshop Timer</a>
                &middot;
                Made by <a href="https://coff.ee/petecohen">Pete Cohen</a>
            </div>
        </div>
    </div>

    <script>
        // --- State ---
        const DEFAULTS = {
            duration: 300,
            bgColor: '#000000',
            textColor: '#ffffff',
            flashEnabled: true
        };

        let timerDuration = DEFAULTS.duration;
        let currentTime = timerDuration;
        let isRunning = false;
        let timerInterval = null;
        let isFinished = false;
        let flashEnabled = DEFAULTS.flashEnabled;
        let startTimestamp = null;
        let pausedTimeRemaining = null;
        let flashTimeout = null;

        // --- DOM refs ---
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerScreen = document.getElementById('timerScreen');
        const settingsScreen = document.getElementById('settingsScreen');
        const flashToggle = document.getElementById('flashToggle');
        const bgColorPicker = document.getElementById('bgColorPicker');
        const textColorPicker = document.getElementById('textColorPicker');
        const bgHex = document.getElementById('bgHex');
        const textHex = document.getElementById('textHex');
        const settingsOpenBtn = document.getElementById('settingsOpenBtn');
        const backBtn = document.getElementById('backBtn');
        const applyCustomBtn = document.getElementById('applyCustomBtn');
        const resetDefaultsBtn = document.getElementById('resetDefaultsBtn');

        // --- Preferences (localStorage) ---
        function loadPrefs() {
            try {
                const saved = localStorage.getItem('workshopTimerPrefs');
                if (saved) {
                    const prefs = JSON.parse(saved);
                    timerDuration = prefs.duration ?? DEFAULTS.duration;
                    currentTime = timerDuration;
                    flashEnabled = prefs.flashEnabled ?? DEFAULTS.flashEnabled;
                    applyColors(prefs.bgColor ?? DEFAULTS.bgColor, prefs.textColor ?? DEFAULTS.textColor);
                    return prefs;
                }
            } catch (e) { /* ignore */ }
            return null;
        }

        function savePrefs() {
            const prefs = {
                duration: timerDuration,
                bgColor: bgColorPicker.value,
                textColor: textColorPicker.value,
                flashEnabled: flashEnabled
            };
            try {
                localStorage.setItem('workshopTimerPrefs', JSON.stringify(prefs));
            } catch (e) { /* ignore */ }
        }

        // --- Color management ---
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function applyColors(bg, text) {
            const root = document.documentElement;
            root.style.setProperty('--bg-color', bg);
            root.style.setProperty('--text-color', text);
            const bgRgb = hexToRgb(bg);
            const textRgb = hexToRgb(text);
            root.style.setProperty('--bg-r', bgRgb.r);
            root.style.setProperty('--bg-g', bgRgb.g);
            root.style.setProperty('--bg-b', bgRgb.b);
            root.style.setProperty('--text-r', textRgb.r);
            root.style.setProperty('--text-g', textRgb.g);
            root.style.setProperty('--text-b', textRgb.b);
            bgColorPicker.value = bg;
            textColorPicker.value = text;
            bgHex.textContent = bg;
            textHex.textContent = text;
        }

        // --- Timer logic (drift-corrected) ---
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(currentTime);
        }

        function onTimerFinished() {
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            isFinished = true;
            startBtn.textContent = 'Start';
            startBtn.setAttribute('aria-label', 'Start timer');
            currentTime = 0;
            updateDisplay();

            if (flashEnabled) {
                document.body.classList.add('finished');
                if (flashTimeout) clearTimeout(flashTimeout);
                flashTimeout = setTimeout(() => {
                    document.body.classList.remove('finished');
                    isFinished = false;
                    flashTimeout = null;
                }, 10000);
            }
        }

        function tick() {
            const elapsed = Math.floor((Date.now() - startTimestamp) / 1000);
            const remaining = pausedTimeRemaining - elapsed;
            if (remaining <= 0) {
                onTimerFinished();
            } else {
                currentTime = remaining;
                updateDisplay();
            }
        }

        function startTimer() {
            if (currentTime === 0) {
                currentTime = timerDuration;
            }
            isRunning = true;
            isFinished = false;
            document.body.classList.remove('finished');
            if (flashTimeout) { clearTimeout(flashTimeout); flashTimeout = null; }
            startBtn.textContent = 'Pause';
            startBtn.setAttribute('aria-label', 'Pause timer');
            startTimestamp = Date.now();
            pausedTimeRemaining = currentTime;
            timerInterval = setInterval(tick, 250);
        }

        function pauseTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            isRunning = false;
            startBtn.textContent = 'Start';
            startBtn.setAttribute('aria-label', 'Start timer');
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function resetTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            isRunning = false;
            isFinished = false;
            document.body.classList.remove('finished');
            if (flashTimeout) { clearTimeout(flashTimeout); flashTimeout = null; }
            startBtn.textContent = 'Start';
            startBtn.setAttribute('aria-label', 'Start timer');
            currentTime = timerDuration;
            updateDisplay();
        }

        function setPreset(seconds) {
            timerDuration = seconds;
            currentTime = timerDuration;
            if (isRunning) pauseTimer();
            updateDisplay();
            updatePresetSelection(seconds);
            savePrefs();
        }

        function updatePresetSelection(seconds) {
            document.querySelectorAll('[data-preset]').forEach(btn => {
                const val = parseInt(btn.dataset.preset);
                btn.classList.toggle('selected', val === seconds);
            });
        }

        function setCustomTimer() {
            const minutes = parseInt(document.getElementById('minutesInput').value) || 0;
            const seconds = parseInt(document.getElementById('secondsInput').value) || 0;
            const totalSeconds = minutes * 60 + seconds;
            if (totalSeconds > 0) {
                timerDuration = totalSeconds;
                currentTime = timerDuration;
                if (isRunning) pauseTimer();
                updateDisplay();
                updatePresetSelection(-1);
                savePrefs();
                applyCustomBtn.textContent = 'Applied';
                applyCustomBtn.classList.add('applied');
                setTimeout(() => {
                    applyCustomBtn.textContent = 'Apply';
                    applyCustomBtn.classList.remove('applied');
                }, 1500);
            }
        }

        // --- Screen navigation ---
        function showSettings() {
            timerScreen.classList.remove('active');
            settingsScreen.classList.add('active');
        }

        function showTimer() {
            settingsScreen.classList.remove('active');
            timerScreen.classList.add('active');
        }

        // --- Event listeners ---
        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);
        settingsOpenBtn.addEventListener('click', showSettings);
        backBtn.addEventListener('click', showTimer);
        applyCustomBtn.addEventListener('click', setCustomTimer);

        // Preset buttons (both screens)
        document.querySelectorAll('[data-preset]').forEach(btn => {
            btn.addEventListener('click', () => {
                setPreset(parseInt(btn.dataset.preset));
            });
        });

        // Flash toggle
        flashToggle.addEventListener('click', () => {
            flashEnabled = !flashEnabled;
            flashToggle.setAttribute('aria-checked', flashEnabled);
            savePrefs();
        });

        flashToggle.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                flashToggle.click();
            }
        });

        // Color pickers
        bgColorPicker.addEventListener('input', () => {
            applyColors(bgColorPicker.value, textColorPicker.value);
            savePrefs();
        });

        textColorPicker.addEventListener('input', () => {
            applyColors(bgColorPicker.value, textColorPicker.value);
            savePrefs();
        });

        // Reset to defaults
        resetDefaultsBtn.addEventListener('click', () => {
            timerDuration = DEFAULTS.duration;
            currentTime = timerDuration;
            flashEnabled = DEFAULTS.flashEnabled;
            flashToggle.setAttribute('aria-checked', flashEnabled);
            applyColors(DEFAULTS.bgColor, DEFAULTS.textColor);
            updatePresetSelection(DEFAULTS.duration);
            if (isRunning) pauseTimer();
            updateDisplay();
            savePrefs();
        });

        // Keyboard shortcuts (skip when in input fields)
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            if (e.code === 'Space') {
                e.preventDefault();
                toggleTimer();
            } else if (e.code === 'KeyR') {
                e.preventDefault();
                resetTimer();
            } else if (e.code === 'KeyS') {
                e.preventDefault();
                if (timerScreen.classList.contains('active')) {
                    showSettings();
                } else {
                    showTimer();
                }
            } else if (e.code === 'Escape' && settingsScreen.classList.contains('active')) {
                showTimer();
            }
        });

        // Prevent zooming on double tap (mobile)
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // --- Init ---
        const savedPrefs = loadPrefs();
        if (savedPrefs) {
            flashToggle.setAttribute('aria-checked', flashEnabled);
            updatePresetSelection(timerDuration);
        }
        updateDisplay();
    </script>
</body>
</html>
